<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 & RB — Tasks & Objectives</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#0d1117;--sur:#161b22;--sur2:#1c2230;--sur3:#1f2937;
  --bd:#30363d;--bd2:#3d4451;
  --ac:#6C63FF;--ac2:#00D4AA;
  --adim:rgba(108,99,255,.13);--a2dim:rgba(0,212,170,.13);
  --tx:#e6edf3;--mu:#8b949e;--mu2:#6e7681;
  --red:#f85149;--yl:#d29922;--gr:#3fb950;
  --fn:'Inter',sans-serif;--mo:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fn);background:var(--bg);color:var(--tx);font-size:14px;}

/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--bd);background:var(--sur);position:sticky;top:0;z-index:50;gap:8px;flex-wrap:wrap;}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.ttl{font-size:15px;font-weight:600;}
.tag{font-size:11px;color:var(--mu);background:var(--sur2);border:1px solid var(--bd);border-radius:20px;padding:2px 8px;}
.tr{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--mu2);}
.sdot.ok{background:var(--gr)}.sdot.err{background:var(--red)}.sdot.spin{background:var(--yl);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.slbl{font-size:12px;color:var(--mu);}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;border-radius:6px;font-size:12px;font-family:var(--fn);font-weight:500;cursor:pointer;border:1px solid var(--bd2);background:var(--sur2);color:var(--tx);}
.btn:hover{background:var(--bd);}
.btn.ghost{background:transparent;border-color:transparent;color:var(--mu);}
.btn.ghost:hover{background:var(--sur2);color:var(--tx);}

/* kpi */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:1px;background:var(--bd);border-bottom:1px solid var(--bd);}
.kpi{background:var(--sur);padding:12px 16px;}
.kv{font-size:20px;font-weight:600;font-family:var(--mo);}
.kv.a{color:var(--ac)}.kv.g{color:var(--gr)}.kv.w{color:var(--yl)}.kv.d{color:var(--red)}
.kl{font-size:11px;color:var(--mu);text-transform:uppercase;letter-spacing:.4px;margin-top:1px;}

/* filters */
.fbar{display:flex;align-items:center;gap:6px;padding:9px 24px;border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.sw{position:relative;flex:1;min-width:150px;max-width:260px;}
.sw svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--mu2);pointer-events:none;}
.si{width:100%;background:var(--sur);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:var(--fn);font-size:13px;padding:6px 8px 6px 28px;outline:none;}
.si:focus{border-color:var(--ac);}
.si::placeholder{color:var(--mu2);}
.chips{display:flex;gap:4px;flex-wrap:wrap;}
.chip{padding:3px 10px;border-radius:20px;border:1px solid var(--bd);background:var(--sur);color:var(--mu);font-size:12px;cursor:pointer;user-select:none;}
.chip:hover{color:var(--tx);border-color:var(--bd2);}
.chip.on{background:var(--adim);border-color:var(--ac);color:var(--ac);}
.chip.f1.on{background:var(--a2dim);border-color:var(--ac2);color:var(--ac2);}

/* grid */
.grid{padding:18px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(390px,1fr));gap:12px;}

/* card */
.card{background:var(--sur);border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.card:hover{border-color:var(--bd2);}
.ch{display:flex;align-items:center;justify-content:space-between;padding:11px 14px 8px;border-bottom:1px solid var(--bd);}
.bn{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;}
.bi{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mo);flex-shrink:0;}
.bc{font-size:11px;color:var(--mu);font-weight:400;}
.rw{position:relative;width:54px;height:54px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.rw svg{width:54px;height:54px;flex-shrink:0;}
.rl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--mo);color:var(--tx);pointer-events:none;}
.pt{height:3px;background:var(--bd);}
.pf{height:3px;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .3s;}

/* table */
.ts{max-height:280px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd2) transparent;}
.ts::-webkit-scrollbar{width:3px;}
.ts::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
table{width:100%;border-collapse:collapse;}
th{font-size:10px;font-weight:600;color:var(--mu2);text-transform:uppercase;letter-spacing:.4px;padding:6px 12px 4px;text-align:left;border-bottom:1px solid var(--bd);}

/* task rows */
.tr2{border-bottom:1px solid var(--bd);cursor:pointer;}
.tr2:hover{background:var(--sur3);}
.tr2.done td:not(:first-child){opacity:.4;}
.tr2.done .tn{text-decoration:line-through;color:var(--mu);}
.tr2.ov .td2{color:var(--red);}
.tr2.sn .td2{color:var(--yl);}
.tr2 td{padding:8px 12px;vertical-align:middle;}

/* detail panel */
.dp{overflow:hidden;max-height:0;transition:max-height .22s ease;background:var(--sur2);}
.dp.open{max-height:180px;}
.dp-in{padding:9px 12px 11px 46px;display:grid;grid-template-columns:1fr 1fr;gap:7px 16px;}
.df{display:flex;flex-direction:column;gap:2px;}
.dl{font-size:10px;color:var(--mu2);text-transform:uppercase;letter-spacing:.3px;}
.dv{font-size:12px;color:var(--tx);}
.dv.note{color:var(--mu);font-style:italic;}

.tn{font-size:13px;font-weight:500;}
.td2{font-size:11px;font-family:var(--mo);color:var(--mu);white-space:nowrap;}
.pb{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;}
.pb.F1{background:var(--a2dim);color:var(--ac2);}
.pb.RB{background:var(--adim);color:var(--ac);}
.pb.Both{background:rgba(200,200,200,.09);color:var(--mu);}

/* checkbox */
.cb{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bd2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
.cb:hover{border-color:var(--ac2);background:var(--a2dim);}
.cb.done{border-color:var(--gr);background:rgba(63,185,80,.15);}
.cb .ck{display:none;}
.cb.done .ck{display:block;}

/* add form */
.at{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu);background:none;border:none;cursor:pointer;padding:7px 12px;width:100%;border-top:1px solid var(--bd);}
.at:hover{color:var(--ac);}
.afw{border-top:1px solid var(--bd);background:var(--sur2);padding:9px 12px 11px;}
.ag{display:grid;grid-template-columns:1fr 75px 75px;gap:6px;margin-bottom:6px;}
.ai,.as{background:var(--sur);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:var(--fn);font-size:12px;padding:5px 7px;outline:none;width:100%;}
.ai:focus,.as:focus{border-color:var(--ac);}
.ai::placeholder{color:var(--mu2);}
.as option{background:var(--sur2);}
.ab{display:flex;gap:5px;margin-top:6px;}
.aok{background:var(--ac);border:none;border-radius:6px;color:#fff;font-family:var(--fn);font-size:12px;font-weight:500;padding:5px 11px;cursor:pointer;}
.aok:hover{opacity:.85;}
.ano{background:transparent;border:1px solid var(--bd2);border-radius:6px;color:var(--mu);font-family:var(--fn);font-size:12px;padding:5px 9px;cursor:pointer;}

.empty{padding:20px;text-align:center;color:var(--mu2);font-size:13px;}
.lbar{height:2px;background:linear-gradient(90deg,var(--ac),var(--ac2),var(--ac));background-size:200%;animation:sh 1.2s infinite;position:fixed;top:0;left:0;right:0;z-index:99;display:none;}
.lbar.on{display:block;}
@keyframes sh{0%{background-position:100%}100%{background-position:-100%}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sur2);border:1px solid var(--bd2);border-radius:10px;padding:10px 15px;font-size:13px;z-index:200;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;max-width:260px;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.ok{border-left:3px solid var(--gr);}
.toast.err{border-left:3px solid var(--red);}
@media(max-width:560px){.grid{padding:10px;grid-template-columns:1fr;}.topbar,.fbar{padding:9px 12px;}}
</style>
</head>
<body>
<div class="lbar" id="LB"></div>
<div class="toast" id="TOAST"></div>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:9px;">
    <div class="logo">🎯</div>
    <span class="ttl">F1 & RB — Tasks & Objectives</span>
    <span class="tag">CNN Umbrella · Live</span>
  </div>
  <div class="tr">
    <div class="sdot spin" id="SD"></div>
    <span class="slbl" id="SL">Connecting…</span>
    <button class="btn" onclick="syncData()">↻ Sync</button>
    <button class="btn ghost" onclick="exportCSV()">↓ Export</button>
  </div>
</div>

<div class="kpis">
  <div class="kpi"><div class="kv a" id="K1">—</div><div class="kl">Total</div></div>
  <div class="kpi"><div class="kv g" id="K2">—</div><div class="kl">Completed</div></div>
  <div class="kpi"><div class="kv w" id="K3">—</div><div class="kl">In progress</div></div>
  <div class="kpi"><div class="kv d" id="K4">—</div><div class="kl">Overdue</div></div>
  <div class="kpi"><div class="kv a" id="K5">—%</div><div class="kl">Overall</div></div>
</div>

<div class="fbar">
  <div class="sw">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="si" id="SI" placeholder="Search tasks…" oninput="draw()">
  </div>
  <div class="chips" id="SC">
    <span class="chip on"  onclick="sf('s','all',this)">All</span>
    <span class="chip"     onclick="sf('s','pending',this)">In progress</span>
    <span class="chip"     onclick="sf('s','overdue',this)">Overdue</span>
    <span class="chip"     onclick="sf('s','done',this)">Completed</span>
  </div>
  <div class="chips" id="PC">
    <span class="chip on"  onclick="sf('p','all',this)">Everyone</span>
    <span class="chip f1"  onclick="sf('p','F1',this)">F1</span>
    <span class="chip"     onclick="sf('p','RB',this)">RB</span>
  </div>
</div>

<div class="grid" id="GRID"></div>

<script>
const URL2  = "https://script.google.com/macros/s/AKfycbyBDHjooGJ5DEtR8Ob0BKuxjXZly2PeRt3Maz_IpdTN3jroU1FLE9LYbR-3QoTTNYM/exec";
const BLIST = ["CNN","ISMA","TSKL","RML","CPL","FTL","KSD","LK","DRLK"];
const CLR   = {CNN:"#6C63FF",ISMA:"#00D4AA",TSKL:"#f0883e",RML:"#e06c75",CPL:"#61afef",FTL:"#c678dd",KSD:"#98c379",LK:"#e5c07b",DRLK:"#56b6c2"};

var tasks   = [];
var fS      = "all";   // status filter
var fP      = "all";   // person filter
var addOpen = {};      // branch -> bool
var openID  = -1;      // which task detail is open (-1 = none)

/* ── sync ── */
async function syncData() {
  bar(1); dot("spin","Syncing…");
  try {
    var res = await fetch(URL2 + "?t=" + Date.now());
    var j   = await res.json();
    var rows = j.data || j;
    tasks = rows.map(function(r, i){
      return {
        id:    parseInt(r.rowIndex) > 0 ? parseInt(r.rowIndex) : (i + 2),
        br:    (r.category   || r[0] || "").toString().trim().toUpperCase(),
        who:   (r.person     || r[1] || "").toString().trim(),
        name:  (r.task       || r[2] || "").toString().trim(),
        date:  (r.targetDate || r[3] || "").toString().trim(),
        done:  (r.completed  || r[4] || "").toString().toLowerCase() === "true",
        note:  (r.notes      || r[5] || "").toString().trim(),
      };
    }).filter(function(t){ return t.name; });
    dot("ok","Synced " + new Date().toLocaleTimeString());
    showToast("Sheet synced ✓","ok");
  } catch(e) {
    dot("err","Sync failed — demo");
    showToast("Could not reach Google Sheets","err");
    demoData();
  }
  draw(); bar(0);
}

function post(payload) {
  // Use GET with params — works reliably from GitHub Pages to Apps Script
  var params = Object.keys(payload).map(function(k){
    return encodeURIComponent(k) + "=" + encodeURIComponent(payload[k]);
  }).join("&");
  fetch(URL2 + "?" + params + "&t=" + Date.now()).catch(function(){});
}

/* ── actions ── */
function tick(id) {
  id = parseInt(id);
  var t = tasks.filter(function(x){ return x.id === id; })[0];
  if (!t) return;
  t.done = !t.done;
  if (t.done) openID = -1;
  draw();
  showToast(t.done ? "Marked complete ✓" : "Marked in progress","ok");
  post({action:"toggle", rowIndex:id});
}

function expand(id) {
  id = parseInt(id);
  openID = (openID === id) ? -1 : id;
  draw();
}

function addTask(br) {
  var n = g("an-"+br).value.trim();
  var w = g("aw-"+br).value || "RB";
  var d = g("ad-"+br).value;
  var o = g("ao-"+br).value.trim();
  if (!n) { showToast("Enter a task name","err"); return; }
  var newID = Date.now();
  tasks.push({id:newID, br:br, who:w, name:n, date:d, done:false, note:o});
  addOpen[br] = false;
  draw();
  showToast("Task added to "+br+" ✓","ok");
  post({action:"add", category:br, person:w, task:n, targetDate:d, notes:o});
  setTimeout(syncData, 2000);
}

/* ── draw ── */
function draw() {
  kpis();
  var grid = g("GRID");

  // save scroll positions
  var scrolls = {};
  var scrollEls = grid.querySelectorAll(".ts");
  for (var i=0; i<scrollEls.length; i++) {
    var el = scrollEls[i];
    if (el.dataset.br) scrolls[el.dataset.br] = el.scrollTop;
  }

  grid.innerHTML = "";
  var today = new Date(); today.setHours(0,0,0,0);
  var soon  = new Date(today); soon.setDate(soon.getDate()+7);
  var q     = g("SI").value.toLowerCase();

  for (var b=0; b<BLIST.length; b++) {
    var br    = BLIST[b];
    var col   = CLR[br] || "#6C63FF";
    var brAll = tasks.filter(function(t){ return t.br === br; });
    var brVis = brAll.filter(function(t){
      if (fP !== "all" && t.who !== fP) return false;
      if (q && t.name.toLowerCase().indexOf(q) < 0) return false;
      if (fS === "done"    && !t.done) return false;
      if (fS === "pending" && t.done)  return false;
      if (fS === "overdue" && (t.done || !t.date || new Date(t.date) >= today)) return false;
      return true;
    });

    var hasFilter = fS!=="all" || fP!=="all" || q;
    if (brVis.length === 0 && hasFilter) continue;

    var doneN = brAll.filter(function(t){ return t.done; }).length;
    var totN  = brAll.length;
    var pct   = totN ? Math.round(doneN/totN*100) : 0;

    // build rows
    var rowsHtml = "";
    if (brVis.length === 0) {
      rowsHtml = '<tr><td colspan="4"><div class="empty">No tasks match filters</div></td></tr>';
    } else {
      for (var r=0; r<brVis.length; r++) {
        var t   = brVis[r];
        var d   = t.date ? new Date(t.date) : null;
        var ov  = d && !t.done && d < today;
        var sn  = d && !t.done && d >= today && d <= soon;
        var cls = t.done ? "done" : ov ? "ov" : sn ? "sn" : "";
        var ds  = d ? d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"2-digit"}) : "—";
        var sc  = t.done ? "var(--gr)" : ov ? "var(--red)" : sn ? "var(--yl)" : "var(--mu)";
        var st  = t.done ? "Completed"  : ov ? "Overdue"   : sn ? "Due soon"  : "In progress";
        var isOpen = (openID === t.id);

        rowsHtml +=
          '<tr class="tr2 '+cls+'" onclick="expand('+t.id+')">' +
            '<td style="width:26px;padding-right:0" onclick="event.stopPropagation()">' +
              '<button class="cb '+(t.done?"done":"")+ '" onclick="tick('+t.id+')">' +
                '<svg class="ck" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#3fb950" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg>' +
              '</button>' +
            '</td>' +
            '<td><div class="tn">'+esc(t.name)+'</div></td>' +
            '<td style="text-align:center"><span class="pb '+esc(t.who)+'">'+esc(t.who)+'</span></td>' +
            '<td style="text-align:right"><span class="td2">'+ds+'</span></td>' +
          '</tr>' +
          '<tr>' +
            '<td colspan="4" style="padding:0">' +
              '<div class="dp '+(isOpen?"open":"")+ '">' +
                '<div class="dp-in">' +
                  '<div class="df"><span class="dl">Assigned to</span><span class="dv">'+esc(t.who||"—")+'</span></div>' +
                  '<div class="df"><span class="dl">Target date</span><span class="dv">'+ds+'</span></div>' +
                  '<div class="df"><span class="dl">Status</span><span class="dv" style="color:'+sc+'">'+st+'</span></div>' +
                  '<div class="df"><span class="dl">Branch</span><span class="dv">'+br+'</span></div>' +
                  (t.note ? '<div class="df" style="grid-column:1/-1"><span class="dl">Notes</span><span class="dv note">'+esc(t.note)+'</span></div>' : '') +
                '</div>' +
              '</div>' +
            '</td>' +
          '</tr>';
      }
    }

    var addF = addOpen[br] ?
      '<div class="afw">' +
        '<div class="ag">' +
          '<input class="ai" id="an-'+br+'" placeholder="Task name…">' +
          '<select class="as" id="aw-'+br+'"><option value="F1">F1</option><option value="RB">RB</option><option value="Both">Both</option></select>' +
          '<input type="date" class="ai" id="ad-'+br+'">' +
        '</div>' +
        '<input class="ai" id="ao-'+br+'" placeholder="Notes (optional)…">' +
        '<div class="ab">' +
          '<button class="aok" onclick="addTask(\''+br+'\')">Add task</button>' +
          '<button class="ano" onclick="addOpen[\''+br+'\']=false;draw()">Cancel</button>' +
        '</div>' +
      '</div>'
      :
      '<button class="at" onclick="addOpen[\''+br+'\']=true;draw()">' +
        '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
        ' Add task' +
      '</button>';

    var card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      '<div class="ch">' +
        '<div class="bn">' +
          '<div class="bi" style="background:'+col+'22;color:'+col+'">'+br+'</div>' +
          br +
          '<span class="bc">'+totN+' task'+(totN!==1?"s":"")+'</span>' +
        '</div>' +
        '<div class="rw">'+ring(pct,col)+'<div class="rl">'+pct+'%</div></div>' +
      '</div>' +
      '<div class="pt"><div class="pf" style="width:'+pct+'%"></div></div>' +
      '<div class="ts" data-br="'+br+'">' +
        '<table>' +
          '<thead><tr>' +
            '<th style="width:26px"></th>' +
            '<th>Task</th>' +
            '<th style="text-align:center">Person</th>' +
            '<th style="text-align:right">Target</th>' +
          '</tr></thead>' +
          '<tbody>'+rowsHtml+'</tbody>' +
        '</table>' +
      '</div>' +
      addF;

    grid.appendChild(card);

    // restore scroll
    var sc2 = card.querySelector(".ts");
    if (sc2 && scrolls[br]) sc2.scrollTop = scrolls[br];
  }
}

function ring(pct, col) {
  var r=22, cx=27, ci=2*Math.PI*r, f=ci*pct/100;
  return '<svg viewBox="0 0 54 54" style="filter:none">' +
    '<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="var(--bd)" stroke-width="4"/>' +
    '<circle cx="'+cx+'" cy="'+cx+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="4" stroke-dasharray="'+f+' '+ci+'" stroke-dashoffset="'+(ci*.25)+'" stroke-linecap="round" style="filter:none"/>' +
    '</svg>';
}

function kpis() {
  var today = new Date(); today.setHours(0,0,0,0);
  var tot = tasks.length;
  var dn  = tasks.filter(function(t){ return t.done; }).length;
  var pd  = tasks.filter(function(t){ return !t.done; }).length;
  var ov  = tasks.filter(function(t){ return !t.done && t.date && new Date(t.date)<today; }).length;
  var pc  = tot ? Math.round(dn/tot*100) : 0;
  g("K1").textContent = tot;
  g("K2").textContent = dn;
  g("K3").textContent = pd;
  g("K4").textContent = ov;
  g("K5").textContent = pc+"%";
}

function sf(type, val, el) {
  if (type==="s") { fS=val; var id="SC"; } else { fP=val; var id="PC"; }
  var chips = g(id).querySelectorAll(".chip");
  for (var i=0; i<chips.length; i++) chips[i].classList.remove("on");
  el.classList.add("on");
  draw();
}

function exportCSV() {
  var rows = [["Branch","Person","Task","Target Date","Completed","Notes"]];
  for (var i=0; i<tasks.length; i++) {
    var t=tasks[i];
    rows.push([t.br,t.who,t.name,t.date,t.done?"Yes":"No",t.note]);
  }
  var csv = rows.map(function(r){ return r.map(function(c){ return '"'+String(c).replace(/"/g,'""')+'"'; }).join(","); }).join("\n");
  var a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
  a.download = "f1-rb-tasks.csv";
  a.click();
  showToast("CSV exported","ok");
}

function bar(on){ g("LB").className=on?"lbar on":"lbar"; }
function dot(cls,lbl){ g("SD").className="sdot "+cls; g("SL").textContent=lbl; }
function showToast(msg,type){
  var el=g("TOAST"); el.textContent=msg; el.className="toast show "+(type||"");
