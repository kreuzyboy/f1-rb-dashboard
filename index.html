<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>F1 & RB — Tasks & Objectives</title>
<style>
/* ── THEME TOKENS ───────────────────────────────────────────── */
:root{
  --accent:#6C63FF; --accent-2:#00D4AA; --accent-glow:rgba(108,99,255,.25);
  --danger:#FF5C5C; --warn:#FFB830; --success:#00D4AA;
  --radius-sm:6px; --radius-md:10px; --radius-lg:14px; --radius-xl:18px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --transition:all .18s ease;
}
[data-theme="dark"]{
  --bg:#0C0E14; --surface:#13161F; --card:#1A1D28;
  --border:#272B3A; --border-light:#1F2330;
  --text:#E8EAF0; --text-2:#8B92A8; --text-3:#555E75;
  --glass:rgba(255,255,255,.04); --shadow:0 4px 24px rgba(0,0,0,.4);
  --header-bg:linear-gradient(135deg,#13161F 0%,#0C0E14 100%);
}
[data-theme="light"]{
  --bg:#F0F2FA; --surface:#FFFFFF; --card:#FFFFFF;
  --border:#DDE1EE; --border-light:#E8ECF5;
  --text:#1A1D2E; --text-2:#5A6180; --text-3:#A0A8C0;
  --glass:rgba(255,255,255,.7); --shadow:0 4px 24px rgba(108,99,255,.10);
  --header-bg:linear-gradient(135deg,#FFFFFF 0%,#F0F2FA 100%);
}

/* ── RESET ──────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;transition:background .25s,color .25s}
button,input,select{font-family:var(--font);color:var(--text);background:var(--card);border:1px solid var(--border)}
input,select{border-radius:var(--radius-sm);padding:8px 10px;font-size:13px;width:100%;outline:none;transition:var(--transition)}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

/* ── HEADER ─────────────────────────────────────────────────── */
.header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:0 28px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.header-inner{max-width:1280px;margin:0 auto;height:62px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-icon{width:38px;height:38px;border-radius:var(--radius-md);background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 12px var(--accent-glow)}
.logo-title{font-size:16px;font-weight:700;letter-spacing:-.3px}
.logo-sub{font-size:11px;color:var(--text-2);margin-top:1px}
.header-actions{display:flex;align-items:center;gap:8px}
.sync-status{font-size:11px;color:var(--text-3);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-md);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:var(--transition);background:var(--glass);border:1px solid var(--border)}
.icon-btn:hover{background:var(--border);transform:scale(1.05)}
.sync-btn{height:34px;padding:0 14px;border-radius:var(--radius-md);cursor:pointer;font-size:12px;font-weight:600;background:linear-gradient(135deg,var(--accent),#8A82FF);color:#fff;border:none;letter-spacing:.3px;transition:var(--transition);display:flex;align-items:center;gap:6px}
.sync-btn:hover{opacity:.88;transform:translateY(-1px)}
.sync-btn.spinning .spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MAIN LAYOUT ─────────────────────────────────────────────── */
.main{max-width:1280px;margin:0 auto;padding:24px 28px}

/* ── CONNECT BAR ─────────────────────────────────────────────── */
.connect-bar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;box-shadow:var(--shadow)}
.connect-bar .cb-label{font-size:12px;font-weight:600;color:var(--text-2);white-space:nowrap;display:flex;align-items:center;gap:6px}
.connect-bar input{flex:1;min-width:220px;background:var(--bg);border-color:var(--border-light)}
.connect-btn{height:36px;padding:0 18px;border-radius:var(--radius-md);background:linear-gradient(135deg,var(--accent),#8A82FF);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;transition:var(--transition)}
.connect-btn:hover{opacity:.88}

/* ── KPI ROW ─────────────────────────────────────────────────── */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius-lg);padding:16px 18px;position:relative;overflow:hidden;transition:var(--transition);box-shadow:var(--shadow)}
.kpi:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:3px 3px 0 0;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
.kpi .k-icon{font-size:20px;margin-bottom:8px}
.kpi .k-label{font-size:11px;color:var(--text-2);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.kpi .k-val{font-size:28px;font-weight:700;line-height:1;margin-bottom:3px}
.kpi .k-sub{font-size:11px;color:var(--text-3)}

/* ── TOOLBAR ─────────────────────────────────────────────────── */
.toolbar-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.person-tabs{display:flex;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:4px}
.tab{padding:6px 16px;border-radius:var(--radius-md);font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text-2);transition:var(--transition)}
.tab.active{background:linear-gradient(135deg,var(--accent),#8A82FF);color:#fff;box-shadow:0 2px 8px var(--accent-glow)}
.tab:hover:not(.active){background:var(--border-light);color:var(--text)}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{padding-left:36px;background:var(--card);border-radius:var(--radius-lg)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-3);pointer-events:none}
.filter-chip{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;background:linear-gradient(135deg,var(--accent),#8A82FF);color:#fff;padding:6px 10px 6px 14px;border-radius:var(--radius-lg)}
.filter-chip button{background:none;border:none;color:#fff;cursor:pointer;font-size:15px;line-height:1;padding:0 2px;opacity:.8}
.filter-chip button:hover{opacity:1}

/* ── LEGEND ──────────────────────────────────────────────────── */
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11px;color:var(--text-2);margin-bottom:16px;align-items:center}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}

/* ── SECTION LABEL ───────────────────────────────────────────── */
.section-label{font-size:11px;color:var(--text-2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin:0 0 12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── BRANCH GRID ─────────────────────────────────────────────── */
.branch-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:28px}
.branch-card{background:var(--card);border:1px solid var(--border-light);border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow);transition:var(--transition)}
.branch-card:hover{box-shadow:0 8px 32px rgba(108,99,255,.12);border-color:var(--accent)}
.branch-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border-light)}
.branch-tag{display:flex;align-items:center;gap:8px}
.branch-badge{width:28px;height:28px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.branch-name{font-size:14px;font-weight:700;color:var(--text);cursor:pointer;transition:var(--transition)}
.branch-name:hover{color:var(--accent)}
.branch-meta{font-size:11px;color:var(--text-3);margin-top:1px}
.branch-right{display:flex;align-items:center;gap:10px}
.avg-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--bg)}
.mini-ring{position:relative;width:36px;height:36px;flex-shrink:0}
.mini-ring svg{transform:rotate(-90deg)}
.mini-ring .ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}

/* ── TASK TABLE ──────────────────────────────────────────────── */
.task-table{width:100%;border-collapse:collapse;font-size:12px}
.task-table th{padding:8px 16px;text-align:left;color:var(--text-3);font-weight:600;border-bottom:1px solid var(--border-light);font-size:10px;text-transform:uppercase;letter-spacing:.05em;background:var(--surface)}
.task-table th.sortable{cursor:pointer;user-select:none;transition:var(--transition)}
.task-table th.sortable:hover{color:var(--accent)}
.sort-arrow{font-size:9px;margin-left:3px;opacity:.4}
.sort-arrow.active{opacity:1;color:var(--accent)}
.task-table td{padding:9px 16px;color:var(--text);vertical-align:middle;transition:background .12s}
.task-table tr:not(:last-child) td{border-bottom:1px solid var(--border-light)}
.task-table tr.task-row:hover td{background:var(--border-light)}
.task-table tr.task-row{cursor:pointer}
.task-row-name{display:flex;align-items:center;gap:8px}
.task-name-text{max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.expand-chevron{font-size:9px;color:var(--text-3);display:inline-block;transition:transform .18s;flex-shrink:0}
.expand-chevron.open{transform:rotate(90deg);color:var(--accent)}

/* ── STATUS CHECK ────────────────────────────────────────────── */
.status-check{cursor:pointer;width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);display:inline-flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:var(--transition)}
.status-check.checked{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:var(--accent);color:#fff}
.status-check:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}

/* ── PROGRESS BAR ────────────────────────────────────────────── */
.bar-wrap{background:var(--border);border-radius:4px;height:6px;min-width:50px;overflow:hidden}
.bar-fill{height:6px;border-radius:4px;transition:width .4s ease}
.pct-label{font-size:11px;font-weight:700;min-width:32px;text-align:right;display:inline-block}

/* ── DUE DATE ────────────────────────────────────────────────── */
.due{font-size:11px;font-weight:500;padding:2px 7px;border-radius:10px;white-space:nowrap}
.due.ok{color:#00D4AA;background:rgba(0,212,170,.1)}
.due.soon{color:#FFB830;background:rgba(255,184,48,.1)}
.due.overdue{color:#FF5C5C;background:rgba(255,92,92,.1)}

/* ── ASSIGNEE PILL ───────────────────────────────────────────── */
.assignee-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--border-light);color:var(--text-2);letter-spacing:.03em}

/* ── EXPAND ROW ──────────────────────────────────────────────── */
.expand-row td{padding:0!important;border-bottom:1px solid var(--border-light)!important}
.expand-panel{background:var(--bg);padding:16px 18px 16px 40px;animation:expandFade .18s ease}
@keyframes expandFade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:12px}
.expand-label{display:block;font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;font-weight:600}
.expand-val{display:block;font-size:13px;color:var(--text);font-weight:500}
.expand-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:12px}
.expand-btn{font-size:12px;font-weight:600;padding:6px 16px;cursor:pointer;border-radius:var(--radius-md);background:linear-gradient(135deg,var(--accent),#8A82FF);color:#fff;border:none;transition:var(--transition)}
.expand-btn:hover{opacity:.88;transform:translateY(-1px)}

/* ── MODAL ───────────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;padding-top:70px;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:26px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.modal h3{font-size:17px;font-weight:700;margin-bottom:6px}
.modal .modal-sub{font-size:12px;color:var(--text-2);margin-bottom:18px}
.modal label{font-size:11px;font-weight:600;color:var(--text-2);display:block;margin-bottom:4px;margin-top:14px;text-transform:uppercase;letter-spacing:.04em}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-actions button{flex:1;padding:10px;font-size:13px;font-weight:600;cursor:pointer;border-radius:var(--radius-md);transition:var(--transition)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8A82FF)!important;color:#fff!important;border:none!important}
.btn-primary:hover{opacity:.88!important;transform:translateY(-1px)!important}
.btn-danger{color:var(--danger)!important;border-color:var(--danger)!important}
.btn-danger:hover{background:rgba(255,92,92,.1)!important}

/* ── NO RESULTS ──────────────────────────────────────────────── */
.no-results{padding:28px;text-align:center;color:var(--text-3);font-size:13px}

/* ── FOOTER ──────────────────────────────────────────────────── */
.footer{text-align:center;font-size:11px;color:var(--text-3);padding:20px 0 10px;border-top:1px solid var(--border-light)}

/* ── SCROLLBAR ───────────────────────────────────────────────── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo-area">
      <div class="logo-icon">🎯</div>
      <div>
        <div class="logo-title">F1 &amp; RB — Tasks &amp; Objectives</div>
        <div class="logo-sub">CNN Umbrella · Google Sheets live sync</div>
      </div>
    </div>
    <div class="header-actions">
      <span class="sync-status" id="last-sync">No sheet connected yet</span>
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle light/dark">🌙</button>
      <button class="sync-btn" id="sync-btn" onclick="syncFromSheet()"><span class="spin">↻</span> Sync</button>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- CONNECT BAR -->
  <div class="connect-bar">
    <div class="cb-label">📊 Data source</div>
    <input type="text" id="sheet-url" placeholder="Paste your Apps Script web app URL (ends in /exec)…" />
    <button class="connect-btn" onclick="connectSheet()">Connect</button>
  </div>

  <!-- KPIs -->
  <div id="kpis" class="kpi-row"></div>

  <!-- TOOLBAR -->
  <div class="toolbar-row">
    <div id="person-tabs" class="person-tabs"></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-box" placeholder="Search tasks, branches, assignees…" oninput="handleSearch(this.value)" />
    </div>
    <div id="branch-filter-chip"></div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <span><span class="legend-dot" style="background:#00D4AA"></span>On track</span>
    <span><span class="legend-dot" style="background:#FFB830"></span>Due soon (≤7 days)</span>
    <span><span class="legend-dot" style="background:#FF5C5C"></span>Overdue</span>
    <span><span class="legend-dot" style="background:#6C63FF"></span>Complete</span>
  </div>

  <!-- BRANCHES -->
  <div class="section-label">Branches</div>
  <div id="branch-grid" class="branch-grid"></div>

  <!-- MODALS -->
  <div id="modal-container"></div>

  <div class="footer">F1 &amp; RB Tasks &amp; Objectives · Connect a Google Sheet for shared cross-device data</div>
</div>

<script>
const BRANCHES=['CNN','ISMA','TSKL','RML','CPL','FTL','KSD','LK'];
const PERSONS=['F1','RB'];
let activePerson='all';
let searchTerm='';
let isolatedBranch=null;
let sortState={key:null,dir:1};
let expandedTaskId=null;

let state=JSON.parse(localStorage.getItem('f1rb_dashboard')||'null')||{sheetUrl:'',tasks:generateSampleTasks()};
let darkMode = localStorage.getItem('f1rb_theme') !== 'light';

function saveState(){localStorage.setItem('f1rb_dashboard',JSON.stringify(state));}

function toggleTheme(){
  darkMode = !darkMode;
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = darkMode ? '🌙' : '☀️';
  localStorage.setItem('f1rb_theme', darkMode ? 'dark' : 'light');
}

function applyTheme(){
  document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : 'light');
  document.getElementById('theme-btn').textContent = darkMode ? '🌙' : '☀️';
}

function generateSampleTasks(){
  const tasks=[];let id=1;const today=new Date();
  const sampleNames={
    CNN:['Media policy review','Broadcast licensing renewal','Staff KPI update','Q3 compliance audit'],
    ISMA:['Cemetery management SOP','Insurance premium filing','Board resolution draft','Membership database update'],
    TSKL:['Annual returns filing','Director registration','Shareholder registry update','Audit report submission'],
    RML:['Asset valuation report','Lease renewal documentation','Maintenance schedule','Utilities reconciliation'],
    CPL:['Contractor vetting','Project milestone review','Cost variance report','Procurement sign-off'],
    FTL:['Fleet insurance renewal','Driver licence checks','Vehicle maintenance log','Fuel cost analysis'],
    KSD:['Knowledge base update','Staff training schedule','Onboarding checklist','Skills gap analysis'],
    LK:['Legal retainer renewal','Contract review queue','Compliance checklist','Litigation status update']
  };
  BRANCHES.forEach(b=>{
    sampleNames[b].forEach((name,i)=>{
      const daysOffset=[-5,3,10,25][i];
      const due=new Date(today);due.setDate(due.getDate()+daysOffset);
      tasks.push({id:id++,branch:b,name,assignee:PERSONS[i%2],pct:[15,40,75,100][i],due:due.toISOString().split('T')[0],status:[15,40,75,100][i]===100?'done':daysOffset<0?'overdue':daysOffset<=7?'soon':'ok'});
    });
  });
  return tasks;
}

function filteredTasks(){
  let tasks=activePerson==='all'?state.tasks:state.tasks.filter(t=>t.assignee===activePerson);
  if(isolatedBranch) tasks=tasks.filter(t=>t.branch===isolatedBranch);
  if(searchTerm.trim()){const q=searchTerm.toLowerCase();tasks=tasks.filter(t=>t.name.toLowerCase().includes(q)||t.branch.toLowerCase().includes(q)||t.assignee.toLowerCase().includes(q));}
  return tasks;
}

function handleSearch(val){searchTerm=val;renderBranches();}
function isolateBranch(b){isolatedBranch=isolatedBranch===b?null:b;render();}
function clearIsolation(){isolatedBranch=null;render();}
function toggleSort(key){if(sortState.key===key){sortState.dir*=-1;}else{sortState.key=key;sortState.dir=1;}renderBranches();}
function sortTasks(tasks){
  if(!sortState.key)return tasks;
  const{key,dir}=sortState;
  return[...tasks].sort((a,b)=>{
    let av=a[key],bv=b[key];
    if(key==='due'){av=new Date(av);bv=new Date(bv);}
    if(key==='pct'){av=Number(av);bv=Number(bv);}
    if(av<bv)return-1*dir;if(av>bv)return 1*dir;return 0;
  });
}
function toggleExpand(id){expandedTaskId=expandedTaskId===id?null:id;renderBranches();}
function toggleDone(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  t.pct=t.pct===100?0:100;t.status=deriveStatus(t.pct,t.due);render();
}
function openTaskDetail(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const today=new Date();today.setHours(0,0,0,0);
  const due=new Date(t.due+'T00:00:00');
  const diffDays=Math.round((due-today)/86400000);
  const statusLabel=t.pct===100?'Complete':diffDays<0?`Overdue by ${Math.abs(diffDays)} day${Math.abs(diffDays)===1?'':'s'}`:diffDays===0?'Due today':`Due in ${diffDays} day${diffDays===1?'':'s'}`;
  const statusColor=t.pct===100?'#6C63FF':diffDays<0?'#FF5C5C':diffDays<=7?'#FFB830':'#00D4AA';
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-bg" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()" style="width:400px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:4px">
          <h3>${t.name}</h3>
          <span class="status-check${t.pct===100?' checked':''}" onclick="toggleDone(${t.id});openTaskDetail(${t.id})" title="Toggle complete">${t.pct===100?'✓':''}</span>
        </div>
        <div class="modal-sub">${t.branch} · ${t.assignee}</div>
        <div style="background:var(--bg);border-radius:var(--radius-md);padding:14px;margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:12px;color:var(--text-2)">Progress</span>
            <span style="font-size:14px;font-weight:700;color:${barColor(t)}">${t.pct}%</span>
          </div>
          <div class="bar-wrap" style="width:100%;height:8px"><div class="bar-fill" style="width:${t.pct}%;background:${barColor(t)};height:8px"></div></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px">
          <span style="color:var(--text-2)">Expected completion</span><span style="font-weight:600">${formatDate(t.due)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:20px">
          <span style="color:var(--text-2)">Status</span><span style="color:${statusColor};font-weight:700">${statusLabel}</span>
        </div>
        <div class="modal-actions">
          <button onclick="closeModal()">Close</button>
          <button class="btn-primary" onclick="openEditModal(${t.id})">✎ Edit task</button>
        </div>
      </div>
    </div>`;
}

function branchAvg(b){const t=filteredTasks().filter(t=>t.branch===b);return t.length?Math.round(t.reduce((s,t)=>s+t.pct,0)/t.length):0;}
function avgColor(p){return p===100?'#6C63FF':p>=70?'#00D4AA':p>=40?'#FFB830':'#FF5C5C';}
function barColor(t){return t.pct===100?'#6C63FF':t.status==='overdue'?'#FF5C5C':t.status==='soon'?'#FFB830':'#00D4AA';}
function dueDateClass(t){return t.pct===100?'ok':t.status==='overdue'?'overdue':t.status==='soon'?'soon':'ok';}
function formatDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}

function miniRing(pct, color){
  const r=14,c=2*Math.PI*r,dash=pct/100*c;
  return `<svg width="36" height="36" viewBox="0 0 36 36">
    <circle cx="18" cy="18" r="${r}" fill="none" stroke="var(--border)" stroke-width="3"/>
    <circle cx="18" cy="18" r="${r}" fill="none" stroke="${color}" stroke-width="3" stroke-dasharray="${dash} ${c}" stroke-linecap="round"/>
  </svg>`;
}

function renderKPIs(){
  const tasks=filteredTasks();
  const overall=tasks.length?Math.round(tasks.reduce((s,t)=>s+t.pct,0)/tasks.length):0;
  const done=tasks.filter(t=>t.pct===100).length;
  const overdue=tasks.filter(t=>t.status==='overdue'&&t.pct<100).length;
  const soon=tasks.filter(t=>t.status==='soon'&&t.pct<100).length;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="k-icon">📊</div><div class="k-label">Overall</div><div class="k-val">${overall}%</div><div class="k-sub">${tasks.length} tasks</div></div>
    <div class="kpi"><div class="k-icon">✅</div><div class="k-label">Completed</div><div class="k-val" style="color:#00D4AA">${done}</div><div class="k-sub">of ${tasks.length}</div></div>
    <div class="kpi"><div class="k-icon">🔴</div><div class="k-label">Overdue</div><div class="k-val" style="color:#FF5C5C">${overdue}</div><div class="k-sub">need attention</div></div>
    <div class="kpi"><div class="k-icon">⚠️</div><div class="k-label">Due soon</div><div class="k-val" style="color:#FFB830">${soon}</div><div class="k-sub">within 7 days</div></div>
    <div class="kpi"><div class="k-icon">🏢</div><div class="k-label">Branches</div><div class="k-val">${activeBranches().length}</div><div class="k-sub">active</div></div>
    <div class="kpi"><div class="k-icon">👥</div><div class="k-label">Personnel</div><div class="k-val">2</div><div class="k-sub">F1 &amp; RB</div></div>
  `;
}

function activeBranches(){
  const fromTasks=[...new Set(state.tasks.map(t=>t.branch))];
  return fromTasks.length?fromTasks.sort():BRANCHES;
}

function sortArrow(key){
  if(sortState.key!==key)return'<span class="sort-arrow">↕</span>';
  return`<span class="sort-arrow active">${sortState.dir===1?'↑':'↓'}</span>`;
}

function renderBranchFilterChip(){
  const el=document.getElementById('branch-filter-chip');
  if(!isolatedBranch){el.innerHTML='';return;}
  el.innerHTML=`<div class="filter-chip">📍 ${isolatedBranch}<button onclick="clearIsolation()">✕</button></div>`;
}

function renderBranches(){
  renderBranchFilterChip();
  const grid=document.getElementById('branch-grid');
  const branchesToShow=isolatedBranch?[isolatedBranch]:activeBranches();
  grid.innerHTML=branchesToShow.map(b=>{
    let tasks=filteredTasks().filter(t=>t.branch===b);
    tasks=sortTasks(tasks);
    const avg=branchAvg(b);const color=avgColor(avg);
    const rows=tasks.map(t=>{
      const isOpen=expandedTaskId===t.id;
      const today=new Date();today.setHours(0,0,0,0);
      const due=new Date(t.due+'T00:00:00');
      const diffDays=Math.round((due-today)/86400000);
      const statusLabel=t.pct===100?'Complete':diffDays<0?`Overdue by ${Math.abs(diffDays)}d`:diffDays===0?'Due today':`Due in ${diffDays}d`;
      const statusColor=t.pct===100?'#6C63FF':diffDays<0?'#FF5C5C':diffDays<=7?'#FFB830':'#00D4AA';
      return`
      <tr class="task-row" onclick="toggleExpand(${t.id})">
        <td>
          <div class="task-row-name">
            <span class="expand-chevron${isOpen?' open':''}">▸</span>
            <span class="status-check${t.pct===100?' checked':''}" onclick="event.stopPropagation();toggleDone(${t.id})" title="Toggle complete">${t.pct===100?'✓':''}</span>
            <span class="task-name-text" title="${t.name}">${t.name}</span>
          </div>
        </td>
        <td><span class="assignee-pill">${t.assignee}</span></td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="bar-wrap" style="width:52px"><div class="bar-fill" style="width:${t.pct}%;background:${barColor(t)}"></div></div>
            <span class="pct-label" style="color:${barColor(t)}">${t.pct}%</span>
          </div>
        </td>
        <td><span class="due ${dueDateClass(t)}">${formatDate(t.due)}</span></td>
        <td><button onclick="event.stopPropagation();openEditModal(${t.id})" style="background:none;border:none;cursor:pointer;padding:3px 5px;color:var(--text-3);font-size:14px;border-radius:var(--radius-sm);transition:var(--transition)" onmouseover="this.style.background='var(--border-light)'" onmouseout="this.style.background='none'">✎</button></td>
      </tr>
      ${isOpen?`
      <tr class="expand-row">
        <td colspan="5">
          <div class="expand-panel">
            <div class="expand-grid">
              <div><span class="expand-label">Branch</span><span class="expand-val">${t.branch}</span></div>
              <div><span class="expand-label">Assignee</span><span class="expand-val">${t.assignee}</span></div>
              <div><span class="expand-label">Expected completion</span><span class="expand-val">${formatDate(t.due)}</span></div>
              <div><span class="expand-label">Status</span><span class="expand-val" style="color:${statusColor}">${statusLabel}</span></div>
            </div>
            <div class="bar-wrap" style="width:100%;height:7px"><div class="bar-fill" style="width:${t.pct}%;background:${barColor(t)};height:7px"></div></div>
            <div class="expand-actions">
              <button class="expand-btn" onclick="event.stopPropagation();openEditModal(${t.id})">✎ Edit task</button>
            </div>
          </div>
        </td>
      </tr>`:''}`;
    }).join('');
    return`
    <div class="branch-card">
      <div class="branch-header">
        <div class="branch-tag">
          <div class="branch-badge">${b.slice(0,2)}</div>
          <div>
            <div class="branch-name" onclick="isolateBranch('${b}')" title="Click to focus">${b}</div>
            <div class="branch-meta">${tasks.length} task${tasks.length!==1?'s':''}</div>
          </div>
        </div>
        <div class="branch-right">
          <span class="avg-badge" style="color:${color}">${avg}%</span>
          <div class="mini-ring">${miniRing(avg,color)}<div class="mini-ring-val" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${color}"></div></div>
        </div>
      </div>
      <table class="task-table">
        <thead><tr>
          <th class="sortable" onclick="toggleSort('name')">Task ${sortArrow('name')}</th>
          <th class="sortable" onclick="toggleSort('assignee')">Who ${sortArrow('assignee')}</th>
          <th class="sortable" onclick="toggleSort('pct')">Progress ${sortArrow('pct')}</th>
          <th class="sortable" onclick="toggleSort('due')">Due ${sortArrow('due')}</th>
          <th></th>
        </tr></thead>
        <tbody>${rows||`<tr><td colspan="5" class="no-results">${searchTerm?'No matching tasks':'No tasks yet'}</td></tr>`}</tbody>
      </table>
    </div>`;
  }).join('');
}

function activePersons(){
  const fromTasks=[...new Set(state.tasks.map(t=>t.assignee))];
  return fromTasks.length?fromTasks.sort():PERSONS;
}

function renderPersonTabs(){
  const container=document.getElementById('person-tabs');
  const people=activePersons();
  container.innerHTML=`<button class="tab${activePerson==='all'?' active':''}" onclick="switchPerson('all',this)">All</button>`+
    people.map(p=>`<button class="tab${activePerson===p?' active':''}" onclick="switchPerson('${p}',this)">${p}</button>`).join('');
}

function render(){renderKPIs();renderPersonTabs();renderBranches();saveState();}
function switchPerson(p,btn){activePerson=p;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');render();}

function openEditModal(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  document.getElementById('modal-container').innerHTML=`
    <div class="modal-bg" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>✎ Edit task</h3>
        <div class="modal-sub">${t.branch} · ${t.assignee}</div>
        <label>Task name</label><input type="text" id="m-name" value="${t.name}" />
        <label>Assignee</label><select id="m-assignee"><option${t.assignee==='F1'?' selected':''}>F1</option><option${t.assignee==='RB'?' selected':''}>RB</option></select>
        <label>% Complete (0–100)</label><input type="number" id="m-pct" min="0" max="100" value="${t.pct}" />
        <label>Expected completion date</label><input type="date" id="m-due" value="${t.due}" />
        <div class="modal-actions">
          <button class="btn-danger" onclick="deleteTask(${id})">🗑 Delete</button>
          <button class="btn-primary" onclick="saveTask(${id})">Save changes</button>
        </div>
      </div>
    </div>`;
}

function closeModal(e){if(e&&e.target!==document.querySelector('.modal-bg'))return;document.getElementById('modal-container').innerHTML='';}
function deriveStatus(pct,due){if(pct===100)return'done';const today=new Date();today.setHours(0,0,0,0);const d=new Date(due+'T00:00:00');const diff=Math.round((d-today)/86400000);return diff<0?'overdue':diff<=7?'soon':'ok';}

function saveTask(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  t.name=document.getElementById('m-name').value.trim()||t.name;
  t.assignee=document.getElementById('m-assignee').value;
  t.pct=Math.min(100,Math.max(0,parseInt(document.getElementById('m-pct').value)||0));
  t.due=document.getElementById('m-due').value||t.due;
  t.status=deriveStatus(t.pct,t.due);
  document.getElementById('modal-container').innerHTML='';render();
}

function deleteTask(id){
  if(!confirm('Delete this task?'))return;
  state.tasks=state.tasks.filter(t=>t.id!==id);
  document.getElementById('modal-container').innerHTML='';render();
}

function connectSheet(){
  const url=document.getElementById('sheet-url').value.trim();
  if(!url){alert('Paste your Apps Script /exec URL.');return;}
  state.sheetUrl=url;saveState();syncFromSheet();
}

async function syncFromSheet(){
  if(!state.sheetUrl){document.getElementById('last-sync').textContent='No sheet connected';return;}
  const btn=document.getElementById('sync-btn');
  btn.classList.add('spinning');
  document.getElementById('last-sync').textContent='Syncing…';
  const url=state.sheetUrl+(state.sheetUrl.includes('?')?'&':'?')+'cachebust='+Date.now();
  try{
    const res=await fetch(url);
    if(!res.ok){document.getElementById('last-sync').textContent=`Sync failed — HTTP ${res.status}`;btn.classList.remove('spinning');return;}
    const json=await res.json();
    if(!Array.isArray(json)||json.length===0){document.getElementById('last-sync').textContent='Sync failed — sheet returned no rows';btn.classList.remove('spinning');return;}
    const findKey=(row,candidates)=>{const keys=Object.keys(row);for(const want of candidates){const hit=keys.find(k=>k.toLowerCase().trim()===want);if(hit)return hit;}return null;};
    const sample=json[0];
    const taskKey=findKey(sample,['task','task name','description']);
    const branchKey=findKey(sample,['branch','category']);
    const personKey=findKey(sample,['assignee','person','owner']);
    const dueKey=findKey(sample,['due','completion date','due date','expected completion']);
    const pctKey=findKey(sample,['pct','%','percent','completion %','% complete']);
    if(!taskKey||!branchKey){document.getElementById('last-sync').textContent='Sync failed — check columns (need task/category)';btn.classList.remove('spinning');return;}
    state.tasks=json.filter(row=>row[taskKey]).map((row,i)=>{
      const rawDue=dueKey?row[dueKey]:'';
      let due='';
      if(rawDue){const d=new Date(rawDue);due=isNaN(d)?'':d.toISOString().split('T')[0];}
      let pct;
      if(pctKey&&row[pctKey]!==''&&row[pctKey]!=null){pct=Math.min(100,Math.max(0,parseInt(row[pctKey])||0));}
      else{pct=due?100:0;}
      return{id:i+1,name:row[taskKey]||'Unnamed',branch:row[branchKey]||'CNN',assignee:personKey?(row[personKey]||'F1'):'F1',pct,due:due||new Date().toISOString().split('T')[0],status:deriveStatus(pct,due||new Date().toISOString().split('T')[0])};
    });
    document.getElementById('last-sync').textContent=`✓ Synced ${new Date().toLocaleTimeString()}`;
    saveState();render();
  }catch(e){
    document.getElementById('last-sync').textContent='Sync failed — check script deployment';
  }
  btn.classList.remove('spinning');
}

// Init
applyTheme();
if(state.sheetUrl)document.getElementById('sheet-url').value=state.sheetUrl;
render();
</script>
</body>
</html>
